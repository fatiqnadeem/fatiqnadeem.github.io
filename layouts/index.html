{{ define "main" }}

<div class="home-photo">
  {{ with .Site.Params.logo }}
  <img src="{{ . | relURL }}" alt="{{ $.Site.Title }}">
  {{ end }}
</div>

{{ with .GetPage "/sections/aboutme.md" }}
<div class="bio">
{{ .Content }}
</div>
{{ end }}

{{ with .GetPage "/sections/contact.md" }}
<hr>
<div class="contact">
{{ .Content }}
</div>
{{ end }}

{{ end }}
