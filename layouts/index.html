{{ define "main" }}

<div class="home-row">
  <div class="home-photo">
    {{ with .Site.Params.logo }}
    <img src="{{ . | relURL }}" alt="{{ $.Site.Title }}">
    {{ end }}
  </div>
  <div class="bio">
    {{ with .GetPage "/sections/aboutme.md" }}
    {{ .Content }}
    {{ end }}
  </div>
</div>

<div class="photo-strip">
  <img src="/images/strip/1_fire_detection.png" alt="Satellite fire detection">
  <img src="/images/strip/2_burned_polygons.png" alt="Burned area mapping">
  <img src="/images/strip/3_smoke_plume.png" alt="Agricultural fire smoke plume">
  <img src="/images/strip/4_ground_truth.png" alt="Field validation plots">
  <img src="/images/strip/5_dashboard.png" alt="Fire monitoring dashboard">
</div>

{{ with .GetPage "/sections/contact.md" }}
<hr>
<div class="contact">
{{ .Content }}
</div>
{{ end }}

{{ end }}
